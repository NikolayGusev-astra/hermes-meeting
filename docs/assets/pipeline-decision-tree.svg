<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1260" width="1600" height="1260" role="img" aria-labelledby="title desc">
  <title id="title">Hermes meeting intelligence decision tree</title>
  <desc id="desc">A bilingual decision tree covering meeting input handling, transcript analysis, protocol generation, opt-in integrations, and GPU auto-detection.</desc>
  <defs>
    <style>
      .sans { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .title { font: 700 28px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #eef2ff; }
      .subtitle { font: 14px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #9aa7bb; }
      .node { font: 600 15px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #e8edf7; }
      .small { font: 13px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #c2ccda; }
      .tiny { font: 11px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #94a3b8; }
      .section { font: 700 14px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #8ea5c8; letter-spacing: 1.5px; }
      .badge { font: 700 11px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #dbeafe; letter-spacing: .5px; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#121c2d"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#183b91"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#159a68"/><stop offset="1" stop-color="#0d513f"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#422078"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#d97706"/><stop offset="1" stop-color="#78350f"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4z" fill="#7f8da3"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity=".28"/></filter>
  </defs>

  <rect width="1600" height="1260" rx="22" fill="url(#bg)"/>
  <text x="60" y="60" class="title">Hermes · meeting intelligence / дерево решений</text>
  <text x="60" y="86" class="subtitle">From incoming media to grounded protocol — local-first, integrations only with explicit consent</text>
  <text x="1540" y="60" text-anchor="end" class="tiny">PIPELINE DECISION TREE</text>

  <!-- Input decision tree -->
  <text x="60" y="128" class="section">1 · INPUT / ВХОД</text>
  <g filter="url(#shadow)">
    <rect x="60" y="155" width="210" height="58" rx="13" fill="url(#blue)"/>
    <text x="165" y="179" text-anchor="middle" class="badge">START</text><text x="165" y="199" text-anchor="middle" class="small">новая встреча / meeting</text>
    <rect x="330" y="145" width="270" height="78" rx="14" fill="#18263c" stroke="#4b74b8" stroke-width="2"/>
    <text x="465" y="177" text-anchor="middle" class="node">Что на входе?</text><text x="465" y="199" text-anchor="middle" class="small">What is the input?</text>
  </g>
  <path d="M270 184H320" stroke="#7f8da3" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M600 184H630V562" stroke="#7f8da3" stroke-width="2.5"/>

  <!-- Sources -->
  <g filter="url(#shadow)">
    <rect x="60" y="260" width="275" height="86" rx="13" fill="#16233a" stroke="#3b82f6"/>
    <text x="82" y="289" class="node">Аудио / видео файл</text><text x="82" y="312" class="small">audio/video file</text><text x="82" y="332" class="tiny">ffmpeg → extract audio → Whisper</text>
    <rect x="60" y="370" width="275" height="86" rx="13" fill="#16233a" stroke="#3b82f6"/>
    <text x="82" y="399" class="node">YouTube URL</text><text x="82" y="421" class="small">yt-dlp download</text><text x="82" y="441" class="tiny">SOCKS5 proxy if configured → audio → Whisper</text>
    <rect x="60" y="480" width="275" height="86" rx="13" fill="#16233a" stroke="#3b82f6"/>
    <text x="82" y="509" class="node">Telegram voice / video</text><text x="82" y="531" class="small">переслано Hermes bot / forwarded</text><text x="82" y="551" class="tiny">download → Whisper</text>
    <rect x="60" y="590" width="275" height="86" rx="13" fill="#16233a" stroke="#3b82f6"/>
    <text x="82" y="619" class="node">Вложение email / attachment</text><text x="82" y="641" class="small">«глянь письмо» → MCP Email lookup</text><text x="82" y="661" class="tiny">download → Whisper</text>
    <rect x="60" y="700" width="275" height="86" rx="13" fill="#16233a" stroke="#3b82f6"/>
    <text x="82" y="729" class="node">URL в чате Hermes</text><text x="82" y="751" class="small">media URL: download → Whisper</text><text x="82" y="771" class="tiny">not media → уточнить у пользователя / ask user</text>
    <rect x="60" y="810" width="275" height="86" rx="13" fill="#173243" stroke="#22c55e"/>
    <text x="82" y="839" class="node">Готовый транскрипт</text><text x="82" y="861" class="small">existing transcript</text><text x="82" y="881" class="tiny">skip STT → clean: garbage filter, strip IDs</text>
  </g>
  <g stroke="#7f8da3" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M630 303H345"/><path d="M630 413H345"/><path d="M630 523H345"/><path d="M630 633H345"/><path d="M630 743H345"/><path d="M630 853H345"/>
  </g>
  <path d="M335 303H700M335 413H700M335 523H700M335 633H700M335 743H700M335 853H700" stroke="#6d7c92" stroke-width="1.5" fill="none"/>
  <path d="M700 303V853" stroke="#6d7c92" stroke-width="2"/>
  <path d="M700 578H735" stroke="#7f8da3" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Transcript -->
  <g filter="url(#shadow)">
    <rect x="745" y="518" width="270" height="120" rx="16" fill="url(#green)"/>
    <text x="880" y="554" text-anchor="middle" class="badge">TRANSCRIPT READY</text>
    <text x="880" y="582" text-anchor="middle" class="node">transcript.txt</text>
    <text x="880" y="607" text-anchor="middle" class="small">очищенный текст / clean text</text>
  </g>
  <path d="M1015 578H1065" stroke="#7f8da3" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Agent phases -->
  <text x="1065" y="128" class="section">2 · AGENT / АНАЛИЗ</text>
  <g filter="url(#shadow)">
    <rect x="1065" y="155" width="455" height="92" rx="15" fill="url(#violet)"/>
    <text x="1090" y="188" class="badge">OWN MODEL / СВОЯ МОДЕЛЬ</text><text x="1090" y="213" class="node">Agent reads transcript · deepseek-v4-pro / Claude / etc.</text>
    <rect x="1065" y="285" width="455" height="88" rx="14" fill="#25203b" stroke="#9a76ec"/>
    <text x="1090" y="318" class="node">Фаза 1 · Участники / Identify participants</text><text x="1090" y="344" class="small">SPEAKER_NN mapping via --participants or clarify</text>
    <rect x="1065" y="400" width="455" height="98" rx="14" fill="#25203b" stroke="#9a76ec"/>
    <text x="1090" y="433" class="node">Фаза 2 · Решения, задачи, риски</text><text x="1090" y="457" class="small">Extract decisions + assignments + risks</text><text x="1090" y="480" class="tiny">Each item grounded with source_quote</text>
    <rect x="1065" y="525" width="455" height="98" rx="14" fill="#3a2732" stroke="#f59e0b"/>
    <text x="1090" y="558" class="node">Фаза 3 · Проверка галлюцинаций</text><text x="1090" y="582" class="small">every item has source_quote · no invented names</text><text x="1090" y="605" class="tiny">Hallucination check / проверка фактов</text>
    <rect x="1065" y="660" width="455" height="90" rx="15" fill="url(#orange)"/>
    <text x="1090" y="694" class="badge">OUTPUT / РЕЗУЛЬТАТ</text><text x="1090" y="720" class="node">Protocol JSON + optional DOCX</text>
  </g>
  <g stroke="#7f8da3" stroke-width="2.5" marker-end="url(#arrow)"><path d="M1292 247V275"/><path d="M1292 373V390"/><path d="M1292 498V515"/><path d="M1292 623V650"/></g>
  <path d="M1065 578H1040V201H1055" stroke="#7f8da3" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Integrations -->
  <text x="60" y="958" class="section">3 · OPTIONAL ACTIONS / НЕОБЯЗАТЕЛЬНЫЕ ДЕЙСТВИЯ</text>
  <rect x="60" y="982" width="1460" height="108" rx="16" fill="#122033" stroke="#355173"/>
  <rect x="84" y="1005" width="190" height="32" rx="16" fill="#be123c"/><text x="179" y="1027" text-anchor="middle" class="badge">OPT-IN ONLY</text>
  <text x="300" y="1027" class="node">Только после явного согласия пользователя / explicit user consent</text>
  <g filter="url(#shadow)">
    <rect x="84" y="1048" width="280" height="28" rx="8" fill="#1b3445"/><text x="224" y="1068" text-anchor="middle" class="small">MCP Jira · tasks / задачи</text>
    <rect x="390" y="1048" width="280" height="28" rx="8" fill="#1b3445"/><text x="530" y="1068" text-anchor="middle" class="small">MCP Confluence · page / страница</text>
    <rect x="696" y="1048" width="280" height="28" rx="8" fill="#1b3445"/><text x="836" y="1068" text-anchor="middle" class="small">MCP Email · send / отправить</text>
    <rect x="1002" y="1048" width="280" height="28" rx="8" fill="#1b3445"/><text x="1142" y="1068" text-anchor="middle" class="small">MCP Calendar · slots / слоты</text>
  </g>
  <path d="M1292 750V925H790V970" stroke="#7f8da3" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Hardware footer -->
  <rect x="60" y="1132" width="1460" height="74" rx="14" fill="#0d1726" stroke="#2d4b68"/>
  <text x="90" y="1162" class="node">GPU auto-detect / автоопределение GPU</text>
  <text x="90" y="1188" class="small">NVIDIA CUDA (cublas)  ›  Apple Silicon (ARM)  ›  AMD ROCm  ›  CPU fallback</text>
  <text x="1500" y="1177" text-anchor="end" class="tiny">best available acceleration</text>
</svg>
